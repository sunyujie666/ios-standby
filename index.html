<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StandBy">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>StandBy Mode</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;color:#fff;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue','PingFang SC',sans-serif;
  -webkit-user-select:none;user-select:none;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
body{display:flex;align-items:center;justify-content:center;position:fixed;inset:0}

/* === 引导页 === */
#guide{
  position:fixed;inset:0;background:#000;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .5s ease;
}
#guide.hide{opacity:0;pointer-events:none}
#guide.gone{display:none}
.g-box{text-align:center;padding:32px}
.g-emoji{font-size:64px;margin-bottom:16px}
.g-title{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.g-sub{font-size:15px;color:rgba(255,255,255,.4);margin-bottom:32px}
.g-btn{
  display:inline-block;padding:14px 48px;
  background:linear-gradient(135deg,#ff9f0a,#ff6723);
  color:#000;border:none;border-radius:50px;
  font-size:17px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(255,159,10,.3);
}
.g-btn:active{transform:scale(.96)}
.g-tips{display:flex;justify-content:center;gap:28px;margin-top:28px}
.g-tip{text-align:center}
.g-tip-icon{font-size:22px;margin-bottom:4px}
.g-tip-text{font-size:11px;color:rgba(255,255,255,.25);line-height:1.4}

/* === 主布局 === */
#app{width:100%;height:100%;display:none}
#app.show{display:block}

.layout{
  width:100%;height:100%;display:flex;
  padding:12px;gap:12px;
}

/* === 左侧：时钟 === */
.clock-panel{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:24px;
  background:rgba(255,255,255,.02);
  position:relative;overflow:hidden;
  min-width:0;
}

.clock-time{
  font-size:min(22vw, 180px);
  font-weight:200;
  letter-spacing:-4px;
  line-height:1;
  font-variant-numeric:tabular-nums;
  color:#fff;
  text-align:center;
}
.clock-colon{
  opacity:.4;
  animation:blink 2s ease-in-out infinite;
}
.clock-sec{
  font-size:min(5vw, 40px);
  font-weight:300;
  color:rgba(255,255,255,.2);
  vertical-align:super;
  margin-left:4px;
}
.clock-date{
  font-size:min(3.5vw, 24px);
  font-weight:400;
  color:rgba(255,255,255,.3);
  margin-top:12px;
  letter-spacing:2px;
  text-align:center;
}

@keyframes blink{
  0%,100%{opacity:.4}
  50%{opacity:1}
}

/* === 右侧：闹钟 === */
.alarm-panel{
  width:280px;flex-shrink:0;
  display:flex;flex-direction:column;
  border-radius:24px;
  background:rgba(255,255,255,.02);
  overflow:hidden;
}

/* 闹钟头部 */
.alarm-head{
  padding:14px 18px 10px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid rgba(255,255,255,.05);
  flex-shrink:0;
}
.alarm-head-icon{font-size:18px}
.alarm-head-title{font-size:16px;font-weight:600;color:rgba(255,255,255,.5)}

/* 设定模式 */
.alarm-set{
  flex:1;display:flex;flex-direction:column;
  padding:12px;gap:8px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.alarm-set.off{display:none}

.q-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.q-btn:active{
  background:rgba(255,159,10,.08);
  border-color:rgba(255,159,10,.2);
}
.q-left{display:flex;align-items:center;gap:12px}
.q-emoji{font-size:20px}
.q-info{display:flex;flex-direction:column;gap:1px}
.q-time{font-size:16px;font-weight:700;color:#fff}
.q-desc{font-size:11px;color:rgba(255,255,255,.28)}
.q-arrow{font-size:14px;color:rgba(255,255,255,.15)}

.divider{
  display:flex;align-items:center;gap:10px;
  padding:4px 0;
}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.06)}
.divider-text{font-size:11px;color:rgba(255,255,255,.2)}

.custom-box{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:12px;
}
.custom-row{display:flex;align-items:center;gap:8px}
.custom-input{
  flex:1;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:10px 12px;
  color:#fff;font-size:17px;font-weight:600;
  text-align:center;outline:none;
  font-variant-numeric:tabular-nums;
  transition:border-color .2s;
}
.custom-input::placeholder{color:rgba(255,255,255,.15)}
.custom-input:focus{border-color:rgba(255,159,10,.4)}
.custom-unit{font-size:13px;color:rgba(255,255,255,.3);white-space:nowrap}
.custom-go{
  margin-top:10px;width:100%;
  background:linear-gradient(135deg,#ff9f0a,#ff6723);
  border:none;border-radius:12px;padding:11px;
  color:#000;font-size:15px;font-weight:700;cursor:pointer;
}
.custom-go:active{transform:scale(.97)}

/* 倒计时模式 */
.alarm-run{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;position:relative;
}
.alarm-run.off{display:none}

.ar-icon{font-size:32px;margin-bottom:6px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.ar-label{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:1px;margin-bottom:2px}
.ar-target{font-size:15px;font-weight:600;color:#ff9f0a;margin-bottom:14px;font-variant-numeric:tabular-nums}
.ar-countdown{
  font-size:min(14vw, 64px);
  font-weight:700;color:#fff;
  font-variant-numeric:tabular-nums;
  letter-spacing:-1px;line-height:1;
  margin-bottom:4px;
  text-shadow:0 0 30px rgba(255,159,10,.12);
}
.ar-unit{font-size:11px;color:rgba(255,255,255,.22);margin-bottom:20px;letter-spacing:1px}
.ar-cancel{
  background:rgba(255,59,48,.1);
  border:1px solid rgba(255,59,48,.15);
  border-radius:50px;padding:9px 28px;
  color:#ff453a;font-size:13px;font-weight:600;
  cursor:pointer;z-index:2;
}
.ar-cancel:active{background:rgba(255,59,48,.2);transform:scale(.96)}

/* 进度环 */
.ring-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.ring-track{fill:none;stroke:rgba(255,255,255,.03);stroke-width:3}
.ring-bar{
  fill:none;stroke:#ff9f0a;stroke-width:3;
  stroke-linecap:round;
  transition:stroke-dashoffset 1s linear;
  filter:drop-shadow(0 0 4px rgba(255,159,10,.25));
}

/* === 闹钟弹窗 === */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{text-align:center;padding:40px;animation:pop .35s ease}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-bell{font-size:64px;animation:ring .35s ease-in-out infinite alternate;margin-bottom:12px}
@keyframes ring{0%{transform:rotate(-18deg)}100%{transform:rotate(18deg)}}
.modal-time{font-size:48px;font-weight:800;color:#ff9f0a;margin-bottom:4px}
.modal-label{font-size:16px;color:rgba(255,255,255,.45);margin-bottom:28px}
.modal-btn{
  background:linear-gradient(135deg,#ff9f0a,#ff6723);
  border:none;border-radius:50px;padding:14px 48px;
  color:#000;font-size:18px;font-weight:700;cursor:pointer;
}
.modal-btn:active{transform:scale(.96)}

/* === 顶部栏 === */
.topbar{
  position:fixed;top:max(6px,env(safe-area-inset-top));
  left:0;right:0;padding:0 max(12px,env(safe-area-inset-right));
  display:flex;justify-content:space-between;align-items:center;
  z-index:50;transition:opacity 3s;
}
.topbar.fade{opacity:0}
.gear{
  background:rgba(255,255,255,.06);border:none;border-radius:50%;
  width:30px;height:30px;color:rgba(255,255,255,.3);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}

/* === 设置面板 === */
#settings{
  position:fixed;inset:0;background:rgba(0,0,0,.94);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  z-index:200;display:flex;flex-direction:column;
  padding:max(48px,env(safe-area-inset-top)+10px) 20px 36px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);
}
#settings.open{transform:translateY(0)}
.s-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.s-title{font-size:22px;font-weight:700}
.s-close{
  background:rgba(255,255,255,.1);border:none;border-radius:50%;
  width:30px;height:30px;color:#fff;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.s-grp{margin-bottom:16px}
.s-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;padding-left:4px}
.s-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 13px;background:rgba(255,255,255,.05);margin-bottom:1px;
}
.s-row:first-of-type{border-radius:10px 10px 2px 2px}
.s-row:last-of-type{border-radius:2px 2px 10px 10px;margin-bottom:0}
.s-row:only-of-type{border-radius:10px}
.s-row-t{font-size:14px;font-weight:500}
.s-row-d{font-size:11px;color:rgba(255,255,255,.3);margin-top:1px}
.sw{
  position:relative;width:48px;height:28px;
  background:#39393d;border-radius:14px;
  cursor:pointer;transition:background .3s;flex-shrink:0;
}
.sw.on{background:#30d158}
.sw::after{
  content:'';position:absolute;top:2px;left:2px;
  width:24px;height:24px;background:#fff;border-radius:50%;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 4px rgba(0,0,0,.3);
}
.sw.on::after{transform:translateX(20px)}

/* === 调暗 === */
#dim{
  position:fixed;inset:0;background:#000;opacity:0;
  z-index:100;pointer-events:none;transition:opacity 2s;
}
#dim.on{opacity:.9}

/* === 息屏 === */
#screenOff{
  position:fixed;inset:0;background:#000;
  z-index:500;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 1.5s ease;
}
#screenOff.on{opacity:1;pointer-events:auto}
.so-hint{
  text-align:center;opacity:0;
  animation:soFade 4s ease-in-out infinite;
}
.so-icon{font-size:36px;margin-bottom:8px}
.so-text{font-size:13px;color:rgba(255,255,255,.15);letter-spacing:1px}
@keyframes soFade{
  0%,100%{opacity:0}
  50%{opacity:1}
}

/* === 强制横屏 === */
@media screen and (orientation:portrait){
  html{
    transform:rotate(90deg);transform-origin:top left;
    width:100vh;height:100vw;overflow:hidden;
    position:absolute;top:0;left:100vw;
  }
}

/* 小屏适配 */
@media screen and (max-height:500px){
  .alarm-panel{width:220px}
  .ar-countdown{font-size:min(12vw,48px)}
  .q-btn{padding:10px 12px}
}

/* 隐藏视频 */
#face-vid{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0}

/* 夜间模式 */
body.night *{filter:none}
body.night #app{filter:sepia(1) hue-rotate(-30deg) saturate(3) brightness(.5)}

/* 低电量 */
body.lowpow *{animation-duration:0s!important;transition-duration:.1s!important}
</style>
</head>
<body>

<!-- 引导页 -->
<div id="guide">
  <div class="g-box">
    <div class="g-emoji">🕐</div>
    <div class="g-title">StandBy</div>
    <div class="g-sub">横放 iPhone，变身智能时钟 + 闹钟</div>
    <button class="g-btn" id="startBtn">开始体验</button>
    <div class="g-tips">
      <div class="g-tip"><div class="g-tip-icon">↕️</div><div class="g-tip-text">上下滑动<br>切换主题</div></div>
      <div class="g-tip"><div class="g-tip-icon">⏰</div><div class="g-tip-text">右侧闹钟<br>快捷设定</div></div>
      <div class="g-tip"><div class="g-tip-icon">👁️</div><div class="g-tip-text">注视感知<br>自动亮屏</div></div>
    </div>
  </div>
</div>

<!-- 主应用 -->
<div id="app">
  <div class="topbar" id="topbar">
    <button class="gear" id="gearBtn">⚙</button>
  </div>

  <div class="layout">
    <!-- 左侧：时钟 -->
    <div class="clock-panel" id="clockPanel">
      <div class="clock-time" id="clockTime">
        00<span class="clock-colon">:</span>00<span class="clock-sec">00</span>
      </div>
      <div class="clock-date" id="clockDate">星期日 · 3月15日</div>
    </div>

    <!-- 右侧：闹钟 -->
    <div class="alarm-panel">
      <div class="alarm-head">
        <span class="alarm-head-icon">⏰</span>
        <span class="alarm-head-title">闹钟</span>
      </div>

      <!-- 设定模式 -->
      <div class="alarm-set" id="alarmSet">
        <div class="q-btn" onclick="SA(5)">
          <div class="q-left"><span class="q-emoji">⚡</span><div class="q-info"><span class="q-time">5 分钟</span><span class="q-desc">快速小憩</span></div></div>
          <span class="q-arrow">›</span>
        </div>
        <div class="q-btn" onclick="SA(10)">
          <div class="q-left"><span class="q-emoji">☕</span><div class="q-info"><span class="q-time">10 分钟</span><span class="q-desc">短暂休息</span></div></div>
          <span class="q-arrow">›</span>
        </div>
        <div class="q-btn" onclick="SA(30)">
          <div class="q-left"><span class="q-emoji">😴</span><div class="q-info"><span class="q-time">30 分钟</span><span class="q-desc">午休小睡</span></div></div>
          <span class="q-arrow">›</span>
        </div>
        <div class="q-btn" onclick="SA(60)">
          <div class="q-left"><span class="q-emoji">🛏️</span><div class="q-info"><span class="q-time">60 分钟</span><span class="q-desc">深度休息</span></div></div>
          <span class="q-arrow">›</span>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">自定义</span>
          <div class="divider-line"></div>
        </div>

        <div class="custom-box">
          <div class="custom-row">
            <input type="number" class="custom-input" id="cInput" placeholder="输入分钟" min="1" max="999">
            <span class="custom-unit">分钟</span>
          </div>
          <button class="custom-go" onclick="SC()">设定闹钟</button>
        </div>
      </div>

      <!-- 倒计时模式 -->
      <div class="alarm-run off" id="alarmRun">
        <svg class="ring-svg" viewBox="0 0 300 300" id="ringSvg">
          <circle class="ring-track" cx="150" cy="150" r="140"/>
          <circle class="ring-bar" cx="150" cy="150" r="140" id="ringBar"
            stroke-dasharray="879.6" stroke-dashoffset="0" transform="rotate(-90 150 150)"/>
        </svg>
        <div class="ar-icon">⏰</div>
        <div class="ar-label">响铃时间</div>
        <div class="ar-target" id="arTarget">00:00</div>
        <div class="ar-countdown" id="arCD">00:00</div>
        <div class="ar-unit" id="arUnit">分 : 秒</div>
        <button class="ar-cancel" onclick="CA()">取消闹钟</button>
      </div>
    </div>
  </div>
</div>

<!-- 调暗遮罩 -->
<div id="dim"></div>

<!-- 息屏遮罩 -->
<div id="screenOff">
  <div class="so-hint">
    <div class="so-icon">🌙</div>
    <div class="so-text">轻触屏幕唤醒</div>
  </div>
</div>

<!-- 设置 -->
<div id="settings">
  <div class="s-head">
    <span class="s-title">设置</span>
    <button class="s-close" id="closeS">✕</button>
  </div>
  <div class="s-grp">
    <div class="s-label">👁️ 注视感知</div>
    <div class="s-row">
      <div><div class="s-row-t">人眼注视感知</div><div class="s-row-d">看一眼亮屏5分钟</div></div>
      <div class="sw on" id="swAttn" onclick="tAttn()"></div>
    </div>
    <div class="s-row">
      <div><div class="s-row-t">自动息屏</div><div class="s-row-d">5分钟无人脸则息屏省电</div></div>
      <div class="sw on" id="swSO" onclick="tSO()"></div>
    </div>
  </div>
  <div class="s-grp">
    <div class="s-label">🌙 显示</div>
    <div class="s-row">
      <div><div class="s-row-t">红色夜间模式</div><div class="s-row-d">降低蓝光</div></div>
      <div class="sw" id="swNight" onclick="tNight()"></div>
    </div>
  </div>
  <div class="s-grp">
    <div class="s-label">⚡ 省电</div>
    <div class="s-row">
      <div><div class="s-row-t">低电量模式</div><div class="s-row-d">关闭动画</div></div>
      <div class="sw" id="swLP" onclick="tLP()"></div>
    </div>
  </div>
</div>

<!-- 闹钟弹窗 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-bell">🔔</div>
    <div class="modal-time" id="modalTime">00:00</div>
    <div class="modal-label" id="modalLabel">闹钟时间到！</div>
    <button class="modal-btn" onclick="DM()">停止闹钟</button>
  </div>
</div>

<!-- 隐藏视频 -->
<video id="face-vid" autoplay playsinline></video>

<script>
// ====== 状态 ======
let alarm=null, cdTimer=null, ringing=false;
let attnOn=localStorage.getItem('sb-attn')!=='false';
let nightOn=localStorage.getItem('sb-night')==='true';
let lpOn=localStorage.getItem('sb-lp')==='true';
let soOn=localStorage.getItem('sb-so')!=='false'; // 自动息屏默认开启
let dimTm=null, clockTm=null, uiTm=null;
let faceDetector=null,vidStream=null,faceInt=null;
let isLooking=false,gazeTm=null,gazePaused=false;
let screenOffTm=null, isScreenOff=false, lastFaceTime=Date.now();
const DIM_DELAY=6000,GAZE_DUR=300000;
const SCREEN_OFF_DELAY=300000; // 5分钟无人脸则息屏
const CIRC=2*Math.PI*140;

const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
const isSA=window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches;

// ====== 初始化 ======
document.addEventListener('DOMContentLoaded',()=>{
  if(nightOn){document.getElementById('swNight').classList.add('on');document.body.classList.add('night')}
  if(lpOn){document.getElementById('swLP').classList.add('on');document.body.classList.add('lowpow')}
  if(!attnOn)document.getElementById('swAttn').classList.remove('on');
  if(!soOn)document.getElementById('swSO').classList.remove('on');
  if(isSA)skipGuide();
  tick();startClock();
  document.getElementById('startBtn').onclick=launch;
  document.getElementById('gearBtn').onclick=()=>document.getElementById('settings').classList.add('open');
  document.getElementById('closeS').onclick=()=>document.getElementById('settings').classList.remove('open');
  document.getElementById('cInput').onkeydown=e=>{if(e.key==='Enter')SC()};
  setupSwipe();fadeUI();
  document.addEventListener('touchstart',()=>{unlockAudio();wakeFromScreenOff();fadeUI();undim()},{passive:true});
  document.addEventListener('touchmove',e=>{
    if(e.target.closest('#settings')||e.target.closest('.alarm-set'))return;
    e.preventDefault();
  },{passive:false});
});

// ====== 启动 ======
async function launch(){
  // 用户交互时机：解锁音频
  unlockAudio();
  try{
    const el=document.documentElement;
    if(el.requestFullscreen)await el.requestFullscreen().catch(()=>{});
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  }catch(e){}
  reqWake();
  const g=document.getElementById('guide');
  g.classList.add('hide');
  document.getElementById('app').classList.add('show');
  setTimeout(()=>g.classList.add('gone'),500);
  if(attnOn)startFace();
}
function skipGuide(){
  document.getElementById('guide').classList.add('gone');
  document.getElementById('app').classList.add('show');
  reqWake();
  if(attnOn)setTimeout(startFace,400);
}

// ====== 时钟 ======
function startClock(){
  if(clockTm)clearInterval(clockTm);
  clockTm=setInterval(tick,lpOn?10000:1000);
}
function tick(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  const WD=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  const ds=`${WD[n.getDay()]} · ${n.getMonth()+1}月${n.getDate()}日`;
  document.getElementById('clockTime').innerHTML=
    `${h}<span class="clock-colon">:</span>${m}<span class="clock-sec">${s}</span>`;
  document.getElementById('clockDate').textContent=ds;
}

  clearTimeout(uiTm);
  document.getElementById('topbar').classList.remove('fade');
  uiTm=setTimeout(()=>document.getElementById('topbar').classList.add('fade'),5000);
}

// ====== 上下滑动（预留多主题扩展）======
function setupSwipe(){
  let sy=0,drag=false;
  document.addEventListener('touchstart',e=>{
    if(e.target.closest('#settings')||e.target.closest('#guide')||e.target.closest('.alarm-panel'))return;
    sy=e.touches[0].clientY;drag=true;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!drag)return;drag=false;
    // 暂只有一个主题，预留扩展
  },{passive:true});
}

// ====== 闹钟 ======
function SA(min){
  if(alarm)clearTimeout(alarm.timer);
  const now=Date.now(),target=now+min*60000;
  alarm={target,min,total:min*60000,timer:setTimeout(trigger,min*60000)};
  showRun();startCD();
}
function SC(){
  const v=parseInt(document.getElementById('cInput').value);
  if(!v||v<1){
    document.getElementById('cInput').style.borderColor='rgba(255,59,48,.5)';
    setTimeout(()=>document.getElementById('cInput').style.borderColor='',800);
    return;
  }
  SA(v);
  document.getElementById('cInput').value='';
  document.getElementById('cInput').blur();
}
function CA(){
  if(alarm){clearTimeout(alarm.timer);alarm=null}
  stopCD();stopSound();ringing=false;showSet();
}
function showSet(){
  document.getElementById('alarmSet').classList.remove('off');
  document.getElementById('alarmRun').classList.add('off');
}
function showRun(){
  document.getElementById('alarmSet').classList.add('off');
  document.getElementById('alarmRun').classList.remove('off');
  if(alarm){
    const t=new Date(alarm.target);
    document.getElementById('arTarget').textContent=
      String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
  }
}
function startCD(){stopCD();updCD();cdTimer=setInterval(updCD,1000)}
function stopCD(){if(cdTimer){clearInterval(cdTimer);cdTimer=null}}
function updCD(){
  if(!alarm)return;
  const rem=Math.max(0,alarm.target-Date.now());
  const ts=Math.ceil(rem/1000),mm=Math.floor(ts/60),ss=ts%60;
  const cd=document.getElementById('arCD'),u=document.getElementById('arUnit');
  if(mm>=60){
    const hh=Math.floor(mm/60),rm=mm%60;
    cd.textContent=`${hh}:${String(rm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    u.textContent='时 : 分 : 秒';
  }else{
    cd.textContent=`${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    u.textContent='分 : 秒';
  }
  const p=1-(rem/alarm.total);
  document.getElementById('ringBar').setAttribute('stroke-dashoffset',CIRC*(1-p));
}
function trigger(){
  ringing=true;playSound();undim();wakeFromScreenOff();
  const n=new Date();
  document.getElementById('modalTime').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('modalLabel').textContent=
    (alarm?alarm.min:'')+' 分钟闹钟到！';
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>{if(ringing)DM()},60000);
}
function DM(){
  document.getElementById('modal').classList.remove('show');
  stopSound();ringing=false;
  if(alarm){clearTimeout(alarm.timer);alarm=null}
  stopCD();showSet();
}

// ====== 闹钟音效（iOS兼容） ======
// 核心：在用户首次交互时预创建并解锁 AudioContext
// 闹钟触发时直接用已解锁的 context 播放，不再新建
let _audioCtx=null;
let _beepTimer=null;

function _getAudioCtx(){
  if(!_audioCtx){
    _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
  // iOS Safari 需要 resume
  if(_audioCtx.state==='suspended'){
    _audioCtx.resume().catch(()=>{});
  }
  return _audioCtx;
}

// 在用户首次交互时解锁音频（静默播放一帧）
function unlockAudio(){
  const ctx=_getAudioCtx();
  // 播放一个无声振荡器来解锁
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  g.gain.value=0; // 无声
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+0.01);
  console.log('[Audio] 已解锁, state:',ctx.state);
}

function playSound(){
  try{
    const ctx=_getAudioCtx();
    beepLoop(ctx);
  }catch(e){console.error('[Audio] playSound err:',e)}
}
function beepLoop(ctx){
  if(!ringing)return;
  // 闹铃音色：三连短促高音 + 一个高音，间隔重复
  const notes=[
    {f:880,dur:.12},{f:0,dur:.08},
    {f:880,dur:.12},{f:0,dur:.08},
    {f:880,dur:.12},{f:0,dur:.15},
    {f:1100,dur:.2},{f:0,dur:.08},
    {f:1100,dur:.2},{f:0,dur:.6}
  ];
  let t=ctx.currentTime+0.05;
  notes.forEach(n=>{
    if(n.f>0){
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.type='square'; // square 比 sine 更响亮
      osc.frequency.value=n.f;
      gain.gain.setValueAtTime(0.5,t);
      gain.gain.exponentialRampToValueAtTime(0.01,t+n.dur);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(t);osc.stop(t+n.dur+0.01);
    }
    t+=n.dur;
  });
  // 循环播放
  _beepTimer=setTimeout(()=>beepLoop(ctx),1800);
}
function stopSound(){
  if(_beepTimer){clearTimeout(_beepTimer);_beepTimer=null}
  // 不关闭 AudioContext，留着复用
}

// ====== 设置 ======
function tAttn(){
  attnOn=!attnOn;localStorage.setItem('sb-attn',attnOn);
  document.getElementById('swAttn').classList.toggle('on',attnOn);
  if(attnOn)startFace();else stopFace();
}
function tNight(){
  nightOn=!nightOn;localStorage.setItem('sb-night',nightOn);
  document.getElementById('swNight').classList.toggle('on',nightOn);
  document.body.classList.toggle('night',nightOn);
}
function tLP(){
  lpOn=!lpOn;localStorage.setItem('sb-lp',lpOn);
  document.getElementById('swLP').classList.toggle('on',lpOn);
  document.body.classList.toggle('lowpow',lpOn);
  startClock();
}
function tSO(){
  soOn=!soOn;localStorage.setItem('sb-so',soOn);
  document.getElementById('swSO').classList.toggle('on',soOn);
  if(!soOn){cancelScreenOff();wakeFromScreenOff()}
}

// ====== 变暗 ======
function startDim(){
  clearDim();dimTm=setTimeout(()=>{
    document.getElementById('dim').classList.add('on');
    // 变暗后开始息屏倒计时
    if(soOn&&attnOn)startScreenOffTimer();
  },DIM_DELAY);
}
function clearDim(){if(dimTm){clearTimeout(dimTm);dimTm=null}}
function undim(){document.getElementById('dim').classList.remove('on');cancelScreenOff()}

// ====== 息屏（5分钟无人脸） ======
function startScreenOffTimer(){
  cancelScreenOff();
  screenOffTm=setTimeout(()=>{
    if(ringing)return; // 闹钟响铃中不息屏
    enterScreenOff();
  },SCREEN_OFF_DELAY);
}
function cancelScreenOff(){
  if(screenOffTm){clearTimeout(screenOffTm);screenOffTm=null}
}
function enterScreenOff(){
  if(isScreenOff)return;
  isScreenOff=true;
  document.getElementById('screenOff').classList.add('on');
  // 降频时钟节省性能
  if(clockTm)clearInterval(clockTm);
  clockTm=setInterval(tick,30000); // 息屏时30秒更新一次
  // 关键：息屏后必须恢复人脸检测，这样才能通过人脸唤醒
  // 如果 gazePaused=true（注视暂停期），需要强制恢复检测
  if(attnOn&&!faceInt){
    gazePaused=false;isLooking=false;
    if(gazeTm){clearTimeout(gazeTm);gazeTm=null}
    restartFaceDetection();
  }
  console.log('[StandBy] 息屏：5分钟无人脸');
}
function wakeFromScreenOff(){
  if(!isScreenOff)return;
  isScreenOff=false;
  document.getElementById('screenOff').classList.remove('on');
  lastFaceTime=Date.now();
  // 恢复正常时钟频率
  startClock();
  // 重新开始注视检测周期
  if(attnOn&&!gazePaused){
    startDim();
  }
  console.log('[StandBy] 唤醒：触摸或人脸');
}

// ====== 注视感知 ======
async function startFace(){
  try{
    if(typeof FaceDetector!=='undefined'){
      faceDetector=new FaceDetector({fastMode:true,maxDetectedFaces:1});
      const v=document.getElementById('face-vid');
      vidStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}});
      v.srcObject=vidStream;await v.play();
      faceInt=setInterval(async()=>{
        try{const f=await faceDetector.detect(v);setLook(f.length>0)}catch(e){}
      },lpOn?1500:500);
      startDim();return;
    }
  }catch(e){}
  try{
    const v=document.getElementById('face-vid');
    vidStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:160,height:120}});
    v.srcObject=vidStream;await v.play();
    const cv=document.createElement('canvas');cv.width=160;cv.height=120;
    const ctx=cv.getContext('2d',{willReadFrequently:true});let prev=null;
    faceInt=setInterval(()=>{
      ctx.drawImage(v,0,0,160,120);
      const data=ctx.getImageData(0,0,160,120).data;
      if(prev){let d=0;for(let i=0;i<data.length;i+=160)d+=Math.abs(data[i]-prev[i]);setLook(d/(data.length/160)>3)}
      prev=new Uint8Array(data);
    },lpOn?2000:800);
    startDim();
  }catch(e){}
}
function setLook(v){
  // 息屏状态：只要检测到人脸就立即唤醒，不做去重
  if(isScreenOff){
    if(v){
      lastFaceTime=Date.now();
      isLooking=true;
      wakeFromScreenOff();
      clearDim();undim();
      // 唤醒后进入正常的注视暂停周期
      if(gazeTm)clearTimeout(gazeTm);
      gazePaused=true;if(faceInt){clearInterval(faceInt);faceInt=null}
      gazeTm=setTimeout(()=>{gazeTm=null;gazePaused=false;isLooking=false;startDim()},GAZE_DUR);
    }
    return;
  }
  // 正常状态：去重判断
  if(gazePaused||v===isLooking)return;
  isLooking=v;
  if(v){
    lastFaceTime=Date.now();
    clearDim();undim();
    if(gazeTm)clearTimeout(gazeTm);
    gazePaused=true;if(faceInt){clearInterval(faceInt);faceInt=null}
    gazeTm=setTimeout(()=>{gazeTm=null;gazePaused=false;isLooking=false;startDim()},GAZE_DUR);
  }else{
    // 没检测到人脸 → 开始变暗流程（变暗后会启动息屏倒计时）
    startDim();
  }
}
// 在已有摄像头流的情况下，重启人脸检测轮询
function restartFaceDetection(){
  if(faceInt){clearInterval(faceInt);faceInt=null}
  const v=document.getElementById('face-vid');
  if(!vidStream||!v.srcObject)return; // 没有摄像头流，无法重启
  if(faceDetector){
    // 使用 FaceDetector API
    faceInt=setInterval(async()=>{
      try{const f=await faceDetector.detect(v);setLook(f.length>0)}catch(e){}
    },lpOn?1500:500);
  }else{
    // 使用运动检测 fallback
    const cv=document.createElement('canvas');cv.width=160;cv.height=120;
    const ctx=cv.getContext('2d',{willReadFrequently:true});let prev=null;
    faceInt=setInterval(()=>{
      ctx.drawImage(v,0,0,160,120);
      const data=ctx.getImageData(0,0,160,120).data;
      if(prev){let d=0;for(let i=0;i<data.length;i+=160)d+=Math.abs(data[i]-prev[i]);setLook(d/(data.length/160)>3)}
      prev=new Uint8Array(data);
    },lpOn?2000:800);
  }
}
function stopFace(){
  if(faceInt){clearInterval(faceInt);faceInt=null}
  if(vidStream){vidStream.getTracks().forEach(t=>t.stop());vidStream=null}
  if(gazeTm){clearTimeout(gazeTm);gazeTm=null}
  faceDetector=null;isLooking=false;gazePaused=false;
  clearDim();undim();cancelScreenOff();wakeFromScreenOff();
}

window.onerror=(m,u,l)=>console.error('ERR:',m,'L:',l);
</script>
