<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StandBy">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>StandBy Mode</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;color:#fff;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue','PingFang SC',sans-serif;
  -webkit-user-select:none;user-select:none;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
body{display:flex;align-items:center;justify-content:center;position:fixed;inset:0}

/* === 引导页 === */
#guide{
  position:fixed;inset:0;background:#000;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .5s ease;
}
#guide.hide{opacity:0;pointer-events:none}
#guide.gone{display:none}
.g-box{text-align:center;padding:32px}
.g-emoji{font-size:64px;margin-bottom:16px}
.g-title{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.g-sub{font-size:15px;color:rgba(255,255,255,.4);margin-bottom:32px}
.g-btn{
  display:inline-block;padding:14px 48px;
  background:linear-gradient(135deg,#ff9f0a,#ff6723);
  color:#000;border:none;border-radius:50px;
  font-size:17px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(255,159,10,.3);
}
.g-btn:active{transform:scale(.96)}
.g-tips{display:flex;justify-content:center;gap:28px;margin-top:28px}
.g-tip{text-align:center}
.g-tip-icon{font-size:22px;margin-bottom:4px}
.g-tip-text{font-size:11px;color:rgba(255,255,255,.25);line-height:1.4}

/* === 主布局 === */
#app{width:100%;height:100%;display:none}
#app.show{display:block}

.layout{
  width:100%;height:100%;display:flex;
  padding:12px;gap:12px;
}

/* === 左侧：时钟 === */
.clock-panel{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:24px;
  background:rgba(255,255,255,.02);
  position:relative;overflow:hidden;
  min-width:0;
}

.clock-time{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:min(22vw, 180px);
  font-weight:200;
  letter-spacing:-4px;
  line-height:1;
  font-variant-numeric:tabular-nums;
  color:#fff;
  text-align:center;
  position:relative;
  padding-right:min(8vw,64px);
}
.clock-hm{
  display:inline-block;
}
.clock-colon{
  opacity:.4;
  animation:blink 2s ease-in-out infinite;
}
.clock-sec{
  position:absolute;
  top:0.12em;
  right:0;
  font-size:min(4vw, 32px);
  font-weight:300;
  color:rgba(255,255,255,.2);
  line-height:1;
  letter-spacing:0;
  transform:translateX(0);
}
.clock-date{
  font-size:min(4.2vw, 28px);
  font-weight:500;
  color:rgba(255,255,255,.55);
  margin-top:14px;
  letter-spacing:2px;
  text-align:center;
}
.clock-weather{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:min(2.5vw, 16px);
  margin-top:8px;
  font-size:min(2.6vw, 15px);
  font-weight:400;
  color:rgba(255,255,255,.18);
  letter-spacing:0.5px;
}
.clock-weather .w-item{
  display:flex;align-items:center;gap:3px;
}
.clock-weather .w-icon{
  font-size:min(2.8vw, 16px);
  opacity:.7;
}

.status-bar{
  position:absolute;
  bottom:8px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:10px;
  color:rgba(255,255,255,.15);
  letter-spacing:0.5px;
  font-weight:400;
  line-height:1.4;
}
.face-dot{
  width:6px;height:6px;border-radius:50%;
  background:#30d158;
  box-shadow:0 0 6px rgba(48,209,88,.5);
  opacity:0;
  transition:opacity .3s;
  flex-shrink:0;
}
.face-dot.on{opacity:1}

@keyframes blink{
  0%,100%{opacity:.4}
  50%{opacity:1}
}

/* === 右侧：闹钟 === */
.alarm-panel{
  width:280px;flex-shrink:0;
  display:flex;flex-direction:column;
  border-radius:24px;
  background:rgba(255,255,255,.02);
  overflow:hidden;
}

/* 闹钟头部 */
.alarm-head{
  padding:14px 18px 10px;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid rgba(255,255,255,.05);
  flex-shrink:0;
}
.alarm-head-icon{font-size:18px}
.alarm-head-title{font-size:16px;font-weight:600;color:rgba(255,255,255,.5)}

/* 设定模式 */
.alarm-set{
  flex:1;display:flex;flex-direction:column;
  padding:12px;gap:8px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.alarm-set.off{display:none}

.q-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.q-btn:active{
  background:rgba(255,159,10,.08);
  border-color:rgba(255,159,10,.2);
}
.q-left{display:flex;align-items:center;gap:12px}
.q-emoji{font-size:20px}
.q-info{display:flex;flex-direction:column;gap:1px}
.q-time{font-size:16px;font-weight:700;color:#fff}
.q-desc{font-size:11px;color:rgba(255,255,255,.28)}
.q-arrow{font-size:14px;color:rgba(255,255,255,.15)}

.divider{
  display:flex;align-items:center;gap:10px;
  padding:4px 0;
}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.06)}
.divider-text{font-size:11px;color:rgba(255,255,255,.2)}

.custom-box{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:12px;
}
.custom-row{display:flex;align-items:center;gap:8px}
.custom-input{
  flex:1;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:10px 12px;
  color:#fff;font-size:17px;font-weight:600;
  text-align:center;outline:none;
  font-variant-numeric:tabular-nums;
  transition:border-color .2s;
}
.custom-input::placeholder{color:rgba(255,255,255,.15)}
.custom-input:focus{border-color:rgba(255,159,10,.4)}
.custom-unit{font-size:13px;color:rgba(255,255,255,.3);white-space:nowrap}
.custom-go{
  margin-top:10px;width:100%;
  background:linear-gradient(135deg,#ff9f0a,#ff6723);
  border:none;border-radius:12px;padding:11px;
  color:#000;font-size:15px;font-weight:700;cursor:pointer;
}
.custom-go:active{transform:scale(.97)}

/* 倒计时模式 */
.alarm-run{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;position:relative;
}
.alarm-run.off{display:none}

.ar-icon{font-size:32px;margin-bottom:6px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.ar-label{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:1px;margin-bottom:2px}
.ar-target{font-size:15px;font-weight:600;color:#ff9f0a;margin-bottom:14px;font-variant-numeric:tabular-nums}
.ar-countdown{
  font-size:min(14vw, 64px);
  font-weight:700;color:#fff;
  font-variant-numeric:tabular-nums;
  letter-spacing:-1px;line-height:1;
  margin-bottom:4px;
  text-shadow:0 0 30px rgba(255,159,10,.12);
}
.ar-unit{font-size:11px;color:rgba(255,255,255,.22);margin-bottom:20px;letter-spacing:1px}
.ar-cancel{
  background:rgba(255,59,48,.1);
  border:1px solid rgba(255,59,48,.15);
  border-radius:50px;padding:9px 28px;
  color:#ff453a;font-size:13px;font-weight:600;
  cursor:pointer;z-index:2;
}
.ar-cancel:active{background:rgba(255,59,48,.2);transform:scale(.96)}

/* 进度环 */
.ring-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.ring-track{fill:none;stroke:rgba(255,255,255,.03);stroke-width:3}
.ring-bar{
  fill:none;stroke:#ff9f0a;stroke-width:3;
  stroke-linecap:round;
  transition:stroke-dashoffset 1s linear;
  filter:drop-shadow(0 0 4px rgba(255,159,10,.25));
}

/* === 闹钟弹窗 === */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{text-align:center;padding:40px;animation:pop .35s ease}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-bell{font-size:64px;animation:ring .35s ease-in-out infinite alternate;margin-bottom:12px}
@keyframes ring{0%{transform:rotate(-18deg)}100%{transform:rotate(18deg)}}
.modal-time{font-size:48px;font-weight:800;color:#ff9f0a;margin-bottom:4px}
.modal-label{font-size:16px;color:rgba(255,255,255,.45);margin-bottom:28px}
.modal-btn{
  background:linear-gradient(135deg,#ff9f0a,#ff6723);
  border:none;border-radius:50px;padding:14px 48px;
  color:#000;font-size:18px;font-weight:700;cursor:pointer;
}
.modal-btn:active{transform:scale(.96)}

/* === 顶部栏 === */
.topbar{
  position:fixed;top:max(6px,env(safe-area-inset-top));
  left:0;right:0;padding:0 max(12px,env(safe-area-inset-right));
  display:flex;justify-content:space-between;align-items:center;
  z-index:50;transition:opacity 3s;
}
.topbar.fade{opacity:0}
.gear{
  background:rgba(255,255,255,.06);border:none;border-radius:50%;
  width:30px;height:30px;color:rgba(255,255,255,.3);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}

/* === 设置面板 === */
#settings{
  position:fixed;inset:0;background:rgba(0,0,0,.94);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  z-index:200;display:flex;flex-direction:column;
  padding:max(48px,env(safe-area-inset-top)+10px) 20px 36px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);
}
#settings.open{transform:translateY(0)}
.s-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.s-title{font-size:22px;font-weight:700}
.s-close{
  background:rgba(255,255,255,.1);border:none;border-radius:50%;
  width:30px;height:30px;color:#fff;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.s-grp{margin-bottom:16px}
.s-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;padding-left:4px}
.s-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 13px;background:rgba(255,255,255,.05);margin-bottom:1px;
}
.s-row:first-of-type{border-radius:10px 10px 2px 2px}
.s-row:last-of-type{border-radius:2px 2px 10px 10px;margin-bottom:0}
.s-row:only-of-type{border-radius:10px}
.s-row-t{font-size:14px;font-weight:500}
.s-row-d{font-size:11px;color:rgba(255,255,255,.3);margin-top:1px}
.sw{
  position:relative;width:48px;height:28px;
  background:#39393d;border-radius:14px;
  cursor:pointer;transition:background .3s;flex-shrink:0;
}
.sw.on{background:#30d158}
.sw::after{
  content:'';position:absolute;top:2px;left:2px;
  width:24px;height:24px;background:#fff;border-radius:50%;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 4px rgba(0,0,0,.3);
}
.sw.on::after{transform:translateX(20px)}

/* === 调暗 === */
#dim{
  position:fixed;inset:0;background:#000;opacity:0;
  z-index:100;pointer-events:none;transition:opacity 2s;
}
#dim.on{opacity:.9}

/* === 摄像头定时器控件 === */
.cam-timer-ctrl{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.ct-btn{
  width:30px;height:30px;border-radius:50%;border:none;
  background:rgba(255,255,255,.12);color:#fff;font-size:18px;
  font-weight:600;cursor:pointer;display:flex;align-items:center;
  justify-content:center;-webkit-tap-highlight-color:transparent;
}
.ct-btn:active{background:rgba(255,255,255,.25)}
.ct-val{
  min-width:36px;text-align:center;font-size:14px;font-weight:600;
  color:#30d158;font-variant-numeric:tabular-nums;
}
.ct-val.off{color:rgba(255,255,255,.3)}
.ct-countdown{color:#ff9f0a;font-size:11px;margin-top:2px}

/* === 强制横屏 === */
@media screen and (orientation:portrait){
  html{
    transform:rotate(90deg);transform-origin:top left;
    width:100vh;height:100vw;overflow:hidden;
    position:absolute;top:0;left:100vw;
  }
}

/* 小屏适配 */
@media screen and (max-height:500px){
  .alarm-panel{width:220px}
  .ar-countdown{font-size:min(12vw,48px)}
  .q-btn{padding:10px 12px}
}

/* 隐藏视频 */
#face-vid{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0}

/* 夜间模式 */
body.night *{filter:none}
body.night #app{filter:sepia(1) hue-rotate(-30deg) saturate(3) brightness(.5)}

/* 低电量 */
body.lowpow *{animation-duration:0s!important;transition-duration:.1s!important}
</style>
</head>
<body>

<!-- 引导页 -->
<div id="guide">
  <div class="g-box">
    <div class="g-emoji">🕐</div>
    <div class="g-title">StandBy</div>
    <div class="g-sub">横放 iPhone，变身智能时钟</div>
    <button class="g-btn" id="startBtn">开始体验</button>
    <div class="g-tips">
      <div class="g-tip"><div class="g-tip-icon">⏰</div><div class="g-tip-text">右侧闹钟<br>快捷设定</div></div>
      <div class="g-tip"><div class="g-tip-icon">👁️</div><div class="g-tip-text">注视感知<br>自动亮屏</div></div>
    </div>
  </div>
</div>

<!-- 主应用 -->
<div id="app">
  <div class="topbar" id="topbar">
    <button class="gear" id="gearBtn">⚙</button>
  </div>

  <div class="layout">
    <!-- 左侧：时钟 -->
    <div class="clock-panel" id="clockPanel">
      <div class="clock-time" id="clockTime">
        <span class="clock-hm">00<span class="clock-colon">:</span>00</span><span class="clock-sec">00</span>
      </div>
      <div class="clock-date" id="clockDate">星期日 · 3月15日</div>
      <div class="clock-weather" id="clockWeather">
        <span class="w-item"><span class="w-icon">🌡</span><span id="wTemp">--°</span></span>
        <span class="w-item"><span class="w-icon">💧</span><span id="wHumi">--%</span></span>
        <span class="w-item"><span class="w-icon" id="wCondIcon">☁</span><span id="wCond">--</span></span>
      </div>
      <div class="status-bar" id="statusBar"><span class="face-dot" id="faceDot"></span><span id="statusText"></span></div>
    </div>

    <!-- 右侧：闹钟 -->
    <div class="alarm-panel">
      <div class="alarm-head">
        <span class="alarm-head-icon">⏰</span>
        <span class="alarm-head-title">闹钟</span>
      </div>

      <!-- 设定模式 -->
      <div class="alarm-set" id="alarmSet">
        <div class="q-btn" onclick="SA(5)">
          <div class="q-left"><span class="q-emoji">⚡</span><div class="q-info"><span class="q-time">5 分钟</span><span class="q-desc">快速小憩</span></div></div>
          <span class="q-arrow">›</span>
        </div>
        <div class="q-btn" onclick="SA(10)">
          <div class="q-left"><span class="q-emoji">☕</span><div class="q-info"><span class="q-time">10 分钟</span><span class="q-desc">短暂休息</span></div></div>
          <span class="q-arrow">›</span>
        </div>
        <div class="q-btn" onclick="SA(30)">
          <div class="q-left"><span class="q-emoji">😴</span><div class="q-info"><span class="q-time">30 分钟</span><span class="q-desc">午休小睡</span></div></div>
          <span class="q-arrow">›</span>
        </div>
        <div class="q-btn" onclick="SA(60)">
          <div class="q-left"><span class="q-emoji">🛏️</span><div class="q-info"><span class="q-time">60 分钟</span><span class="q-desc">深度休息</span></div></div>
          <span class="q-arrow">›</span>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">自定义</span>
          <div class="divider-line"></div>
        </div>

        <div class="custom-box">
          <div class="custom-row">
            <input type="number" class="custom-input" id="cInput" placeholder="输入分钟" min="1" max="999">
            <span class="custom-unit">分钟</span>
          </div>
          <button class="custom-go" onclick="SC()">设定闹钟</button>
        </div>
      </div>

      <!-- 倒计时模式 -->
      <div class="alarm-run off" id="alarmRun">
        <svg class="ring-svg" viewBox="0 0 300 300" id="ringSvg">
          <circle class="ring-track" cx="150" cy="150" r="140"/>
          <circle class="ring-bar" cx="150" cy="150" r="140" id="ringBar"
            stroke-dasharray="879.6" stroke-dashoffset="0" transform="rotate(-90 150 150)"/>
        </svg>
        <div class="ar-icon">⏰</div>
        <div class="ar-label">响铃时间</div>
        <div class="ar-target" id="arTarget">00:00</div>
        <div class="ar-countdown" id="arCD">00:00</div>
        <div class="ar-unit" id="arUnit">分 : 秒</div>
        <button class="ar-cancel" onclick="CA()">取消闹钟</button>
      </div>
    </div>
  </div>
</div>

<!-- 调暗遮罩 -->
<div id="dim"></div>

<!-- 设置 -->
<div id="settings">
  <div class="s-head">
    <span class="s-title">设置</span>
    <button class="s-close" id="closeS">✕</button>
  </div>
  <div class="s-grp">
    <div class="s-label">👁️ 注视感知</div>
    <div class="s-row">
      <div><div class="s-row-t">人眼注视感知</div><div class="s-row-d">看一眼亮屏5分钟，期间暂停检测省电</div></div>
      <div class="sw on" id="swAttn" onclick="tAttn()"></div>
    </div>
    <div class="s-row" id="camTimerRow" style="display:none">
      <div style="flex:1">
        <div class="s-row-t">运行时长</div>
        <div class="s-row-d" id="camTimerDesc">到时关闭摄像头，交由系统自动息屏</div>
      </div>
      <div class="cam-timer-ctrl">
        <button class="ct-btn" onclick="adjCamTimer(-1)">−</button>
        <span class="ct-val" id="camTimerVal">常驻</span>
        <button class="ct-btn" onclick="adjCamTimer(1)">+</button>
      </div>
    </div>
  </div>
  <div class="s-grp">
    <div class="s-label">🌙 显示</div>
    <div class="s-row">
      <div><div class="s-row-t">红色夜间模式</div><div class="s-row-d">降低蓝光</div></div>
      <div class="sw" id="swNight" onclick="tNight()"></div>
    </div>
  </div>
  <div class="s-grp">
    <div class="s-label">⚡ 省电</div>
    <div class="s-row">
      <div><div class="s-row-t">低电量模式</div><div class="s-row-d">关闭动画</div></div>
      <div class="sw" id="swLP" onclick="tLP()"></div>
    </div>
  </div>
</div>

<!-- 闹钟弹窗 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-bell">🔔</div>
    <div class="modal-time" id="modalTime">00:00</div>
    <div class="modal-label" id="modalLabel">闹钟时间到！</div>

// 天气代码 → 图标 + 描述
function weatherDesc(code){
  if(code===0) return ['☀️','晴'];
  if(code<=3) return ['⛅','多云'];
  if(code<=48) return ['🌫','雾'];
  if(code<=57) return ['🌦','毛毛雨'];
  if(code<=67) return ['🌧','雨'];
  if(code<=77) return ['🌨','雪'];
  if(code<=82) return ['🌧','阵雨'];
  if(code<=86) return ['🌨','阵雪'];
  if(code>=95) return ['⛈','雷暴'];
  return ['☁️','多云'];
}

async function fetchWeather(){
  try{
    // 先尝试定位
    const pos=await new Promise((ok,no)=>{
      navigator.geolocation.getCurrentPosition(ok,no,{timeout:8000,maximumAge:600000});
    });
    const lat=pos.coords.latitude.toFixed(2);
    const lon=pos.coords.longitude.toFixed(2);
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code&timezone=auto`;
    const resp=await fetch(url);
    const data=await resp.json();
    const cur=data.current;
    const temp=Math.round(cur.temperature_2m);
    const humi=cur.relative_humidity_2m;
    const [icon,desc]=weatherDesc(cur.weather_code);
    document.getElementById('wTemp').textContent=temp+'°';
    document.getElementById('wHumi').textContent=humi+'%';
    document.getElementById('wCondIcon').textContent=icon;
    document.getElementById('wCond').textContent=desc;
    console.log('[Weather] 更新成功:',temp+'°',humi+'%',desc);
  }catch(e){
    console.log('[Weather] 获取失败:',e.message);
    // 定位失败时尝试用 IP 定位（fallback）
    try{
      const resp=await fetch('https://api.open-meteo.com/v1/forecast?latitude=31.23&longitude=121.47&current=temperature_2m,relative_humidity_2m,weather_code&timezone=auto');
      const data=await resp.json();
      const cur=data.current;
      const temp=Math.round(cur.temperature_2m);
      const humi=cur.relative_humidity_2m;
      const [icon,desc]=weatherDesc(cur.weather_code);
      document.getElementById('wTemp').textContent=temp+'°';

      document.getElementById('wCondIcon').textContent=icon;
      document.getElementById('wCond').textContent=desc;
      console.log('[Weather] fallback 更新成功');
    }catch(e2){
      console.log('[Weather] fallback 也失败:',e2.message);
    }
  }
}

// ====== 闹钟音效（iOS兼容） ======
// 核心：在用户首次交互时预创建并解锁 AudioContext
// 闹钟触发时直接用已解锁的 context 播放，不再新建
let _audioCtx=null;
let _beepTimer=null;

function _getAudioCtx(){
  if(!_audioCtx){
    _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
  // iOS Safari 需要 resume
  if(_audioCtx.state==='suspended'){
    _audioCtx.resume().catch(()=>{});
  }
  return _audioCtx;
}

// 在用户首次交互时解锁音频（静默播放一帧）
function unlockAudio(){
  const ctx=_getAudioCtx();
  // 播放一个无声振荡器来解锁
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  g.gain.value=0; // 无声
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+0.01);
  console.log('[Audio] 已解锁, state:',ctx.state);
}

function playSound(){
  try{
    const ctx=_getAudioCtx();
    beepLoop(ctx);
  }catch(e){console.error('[Audio] playSound err:',e)}
}
function beepLoop(ctx){
  if(!ringing)return;
  // 闹铃音色：三连短促高音 + 一个高音，间隔重复
  const notes=[
    {f:880,dur:.12},{f:0,dur:.08},
    {f:880,dur:.12},{f:0,dur:.08},
    {f:880,dur:.12},{f:0,dur:.15},
    {f:1100,dur:.2},{f:0,dur:.08},
    {f:1100,dur:.2},{f:0,dur:.6}
  ];
  let t=ctx.currentTime+0.05;
  notes.forEach(n=>{
    if(n.f>0){
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.type='square'; // square 比 sine 更响亮
      osc.frequency.value=n.f;
      gain.gain.setValueAtTime(0.5,t);
      gain.gain.exponentialRampToValueAtTime(0.01,t+n.dur);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(t);osc.stop(t+n.dur+0.01);
    }
    t+=n.dur;
  });
  // 循环播放
  _beepTimer=setTimeout(()=>beepLoop(ctx),1800);
}
function stopSound(){
  if(_beepTimer){clearTimeout(_beepTimer);_beepTimer=null}
  // 不关闭 AudioContext，留着复用
}

function adjCamTimer(dir){
  const idx=CAM_TIMER_OPTIONS.indexOf(camTimerHrs);
  let ni=idx+dir;
  if(ni<0)ni=CAM_TIMER_OPTIONS.length-1;
  if(ni>=CAM_TIMER_OPTIONS.length)ni=0;
  camTimerHrs=CAM_TIMER_OPTIONS[ni];
  updateCamTimerUI();
  if(camTimerHrs>0){
    setCamTimer(camTimerHrs);
  }else{
    clearCamTimer();
  }
}
function setCamTimer(hrs){
  clearCamTimer();
  camTimerHrs=hrs;
  camTimerEndAt=Date.now()+hrs*3600000;
  camTimerTm=setTimeout(()=>{
    // 到时间了：关闭注视感知 + 释放 Wake Lock → 系统自动息屏
    camTimerTm=null;
    camTimerHrs=0;camTimerEndAt=0;
    if(attnOn){
      attnOn=false;localStorage.setItem('sb-attn',false);
      document.getElementById('swAttn').classList.remove('on');
      stopFace();showCamTimerRow(false);
    }
    // 关键：释放屏幕常亮，让系统按用户设置的自动锁定时间息屏
    releaseWake();
    updateCamTimerUI();
    updateStatus();
    console.log('[CamTimer] 定时到期，已关闭摄像头并释放屏幕常亮');
  },hrs*3600000);
  console.log('[CamTimer] 设置'+hrs+'小时后关闭');
}
function clearCamTimer(){
  if(camTimerTm){clearTimeout(camTimerTm);camTimerTm=null}
  camTimerEndAt=0;

}
function updateCamTimerUI(){

  if(camTimerHrs===0){

  }else{
    valEl.textContent=camTimerHrs+'h';
    valEl.classList.remove('off');
    if(camTimerEndAt>0){
      const endTime=new Date(camTimerEndAt);
      const hh=String(endTime.getHours()).padStart(2,'0');
      const mm=String(endTime.getMinutes()).padStart(2,'0');
      descEl.innerHTML=hh+':'+mm+' 关闭摄像头，之后系统自动息屏';
    }else{
      descEl.textContent=camTimerHrs+'小时后关闭，之后系统自动息屏';
    }
  }
}

// ====== 屏幕状态机 ======
// 简化：'bright' → 'dim' → 'screenoff'（息屏 = 释放 Wake Lock 让系统锁屏）
//       ↑__________________________|  (触摸唤醒)
let screenState='bright';

// -- 变暗 --
function startDim(){
  clearDim();
  dimStartAt=Date.now();
  dimTm=setTimeout(()=>{
    screenState='dim';
    document.getElementById('dim').classList.add('on');
    console.log('[Screen] → dim');
    updateStatus();
  },DIM_DELAY);
}
function clearDim(){if(dimTm){clearTimeout(dimTm);dimTm=null}}
// undim 只做视觉还原，不管任何 timer
function undim(){document.getElementById('dim').classList.remove('on')}

// -- 息屏（释放 Wake Lock，系统自动锁屏）--
function enterScreenOff(){
  if(isScreenOff)return;
  isScreenOff=true;
  screenState='screenoff';
  // 停止摄像头
  if(attnOn){
    attnOn=false;localStorage.setItem('sb-attn',false);
    document.getElementById('swAttn').classList.remove('on');
    stopFace();showCamTimerRow(false);clearCamTimer();
  }
  // 停止时钟
  if(clockTm){clearInterval(clockTm);clockTm=null}
  // 关键：释放屏幕常亮，让系统自动锁屏
  releaseWake();
  console.log('[Screen] → screenoff (Wake Lock released, system will lock screen)');
  updateStatus();
}
function cancelScreenOff(){
  if(screenOffTm){clearTimeout(screenOffTm);screenOffTm=null}
}

// -- 唤醒（统一入口，触摸/人脸都走这里）--
function wakeUp(reason){
  console.log('[wakeUp]',reason,'screenState=',screenState,'isScreenOff=',isScreenOff);

  // 变暗状态下触摸，只恢复亮度+重新开始变暗
  if(reason==='touch'&&screenState==='dim'&&!isScreenOff){
    clearDim();
    undim();
    screenState='bright';
    dimStartAt=Date.now();
    dimTm=setTimeout(()=>{
      screenState='dim';
      document.getElementById('dim').classList.add('on');
      updateStatus();
    },DIM_DELAY);
    updateStatus();
    return;
  }

  // 清除所有 timer
  clearDim();
  cancelScreenOff();
  // 视觉还原
  undim();
  // 息屏还原
  if(isScreenOff){
    isScreenOff=false;
    reqWake(); // 重新申请屏幕常亮
    startClock(); // 恢复时钟
  }
  screenState='bright';
  lastFaceTime=Date.now();
  console.log('[Screen] → bright (' + reason + ')');
  // face 唤醒：setLook 会进入 gazePaused → 5min → startDim
  // 其他唤醒：需要重启变暗流程
  if(reason!=='face'){
    if(reason==='touch') ensureFaceDetectionRunning();
    startDim();
  }
  updateStatus();
}

// ====== 注视感知 ======
async function startFace(){
  try{
    if(typeof FaceDetector!=='undefined'){
      faceDetector=new FaceDetector({fastMode:true,maxDetectedFaces:1});
      const v=document.getElementById('face-vid');
      vidStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}});
      v.srcObject=vidStream;await v.play();
      faceInt=setInterval(async()=>{
        try{const f=await faceDetector.detect(v);setLook(f.length>0)}catch(e){}
      },lpOn?FACE_INTERVAL_LOWPOW:FACE_INTERVAL_NORMAL);
      console.log('[Face] FaceDetector API 启动, 间隔:'+(lpOn?FACE_INTERVAL_LOWPOW:FACE_INTERVAL_NORMAL)+'ms');
      updateStatus();return;
    }
  }catch(e){console.log('[Face] FaceDetector 不可用:',e.message)}
  try{
    const v=document.getElementById('face-vid');
    vidStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:160,height:120}});
    v.srcObject=vidStream;await v.play();
    const cv=document.createElement('canvas');cv.width=160;cv.height=120;
    const ctx=cv.getContext('2d',{willReadFrequently:true});let prev=null;
    faceInt=setInterval(()=>{
      ctx.drawImage(v,0,0,160,120);
      const data=ctx.getImageData(0,0,160,120).data;
      if(prev){let d=0;for(let i=0;i<data.length;i+=160)d+=Math.abs(data[i]-prev[i]);setLook(d/(data.length/160)>3)}
      prev=new Uint8Array(data);
    },lpOn?MOTION_INTERVAL_LOWPOW:MOTION_INTERVAL_NORMAL);
    console.log('[Face] 运动检测 fallback 启动, 间隔:'+(lpOn?MOTION_INTERVAL_LOWPOW:MOTION_INTERVAL_NORMAL)+'ms');
    updateStatus();
  }catch(e){console.log('[Face] 摄像头不可用:',e.message)}
}
function setLook(v){
  // 立即更新绿点状态
  const dot=document.getElementById('faceDot');
  if(dot && !gazePaused && attnOn){
    dot.classList.toggle('on',v);
  }
  // 注视暂停期，忽略所有检测结果
  if(gazePaused)return;
  if(v===isLooking)return; // 去重
  isLooking=v;
  if(v){
    // 检测到人脸 → 唤醒 + 注视暂停
    lastFaceTime=Date.now();
    wakeUp('face');
    enterGazePause();
  }else{
    // 没检测到人脸 → 开始变暗流程
    startDim();
  }
}

// 进入注视暂停：亮屏5分钟，期间暂停检测但保持流（避免iOS重复弹权限）
function enterGazePause(){
  if(gazeTm)clearTimeout(gazeTm);
  gazePaused=true;
  gazeEndAt=Date.now()+GAZE_DUR;
  // 停止检测轮询
  if(faceInt){clearInterval(faceInt);faceInt=null}
  // ★ 暂停摄像头轨道（不销毁流！iOS Safari 每次 getUserMedia 都弹权限）
  pauseCamera();
  gazeTm=setTimeout(()=>{
    // 5分钟到，恢复检测
    gazeTm=null;
    gazePaused=false;
    isLooking=false;
    // ★ 恢复摄像头轨道（无需重新获取权限）
    resumeCamera();
    restartFaceDetection('normal');
    startDim();
    console.log('[Gaze] 注视暂停结束，已恢复检测');
    updateStatus();
  },GAZE_DUR);
  updateStatus();
}

// 暂停摄像头：禁用轨道（硬件降功耗，但不销毁流，避免重新弹权限）
// 注意：iOS 状态栏绿点不会消失，但这是唯一不弹权限的方案
function pauseCamera(){
  if(vidStream){
    vidStream.getTracks().forEach(t=>{t.enabled=false});
    console.log('[Camera] 已暂停(track.enabled=false)');
  }
}

// 恢复摄像头：重新启用轨道
function resumeCamera(){
  if(vidStream){
    vidStream.getTracks().forEach(t=>{t.enabled=true});
    const v=document.getElementById('face-vid');
    if(v && !v.srcObject) v.srcObject=vidStream;
    console.log('[Camera] 已恢复(track.enabled=true)');
  }
}

// 彻底释放摄像头（仅在用户主动关闭注视感知时调用）
function releaseCamera(){
  if(vidStream){
    vidStream.getTracks().forEach(t=>t.stop());
    vidStream=null;
    console.log('[Camera] 已释放');
  }
  const v=document.getElementById('face-vid');
  if(v) v.srcObject=null;
}

// 确保人脸检测正在运行（如果没在跑就重启）
async function ensureFaceDetectionRunning(){
  if(!attnOn)return;
  if(faceInt)return; // 已经在跑
  // 强制清除暂停状态
  gazePaused=false;
  isLooking=false;
  if(gazeTm){clearTimeout(gazeTm);gazeTm=null}
  // 确保轨道已启用
  resumeCamera();
  restartFaceDetection();
  console.log('[Face] 确保检测运行中');
}
// 在已有摄像头流的情况下，重启人脸检测轮询
function restartFaceDetection(){
  if(faceInt){clearInterval(faceInt);faceInt=null}
  const v=document.getElementById('face-vid');
  if(!vidStream||!v.srcObject)return;
  if(faceDetector){
    const interval=lpOn?FACE_INTERVAL_LOWPOW:FACE_INTERVAL_NORMAL;
    faceInt=setInterval(async()=>{
      try{const f=await faceDetector.detect(v);setLook(f.length>0)}catch(e){}
    },interval);
    console.log('[Face] 重启检测, 间隔:'+interval+'ms');
  }else{
    const interval=lpOn?MOTION_INTERVAL_LOWPOW:MOTION_INTERVAL_NORMAL;
    const cv=document.createElement('canvas');cv.width=160;cv.height=120;
    const ctx=cv.getContext('2d',{willReadFrequently:true});let prev=null;
    faceInt=setInterval(()=>{
      ctx.drawImage(v,0,0,160,120);
      const data=ctx.getImageData(0,0,160,120).data;
      if(prev){let d=0;for(let i=0;i<data.length;i+=160)d+=Math.abs(data[i]-prev[i]);setLook(d/(data.length/160)>3)}
      prev=new Uint8Array(data);
    },interval);
    console.log('[Face] 重启运动检测, 模式:'+mode+', 间隔:'+interval+'ms');
  }
}
function stopFace(){
  if(faceInt){clearInterval(faceInt);faceInt=null}
  releaseCamera(); // 用户主动关闭时才真正释放
  if(gazeTm){clearTimeout(gazeTm);gazeTm=null}
  faceDetector=null;isLooking=false;gazePaused=false;
  wakeUp('stop');
}

// ====== 状态指示器 ======
// 记录变暗开始时间
let dimStartAt=0;

function updateStatus(){
  const el=document.getElementById('statusText');
  const dot=document.getElementById('faceDot');
  if(!el)return;
  const now=Date.now();
  let txt='';

  // 摄像头状态
  if(attnOn){
    if(gazePaused){
      const left=gazeTm?Math.max(0,Math.ceil((gazeEndAt-now)/1000)):0;
      txt='⏸ 已暂停 '+fmtSec(left);
    }else if(vidStream && faceInt){
      txt='👁 检测中';
    }else if(vidStream){
      txt='📷 就绪';
    }else{
      txt='📷 待启动';
    }
    // 摄像头定时倒计时
    if(camTimerEndAt>0){
      const camLeft=Math.max(0,Math.ceil((camTimerEndAt-now)/60000));
      if(camLeft>60) txt+=' · '+Math.floor(camLeft/60)+'h'+String(camLeft%60).padStart(2,'0')+'m后关';
      else if(camLeft>0) txt+=' · '+camLeft+'m后关';
      else txt+=' · 即将关闭';
    }
  }else{
    txt='📷 关闭';
  }

  if(screenState==='bright'&&dimTm){
    const left=Math.max(0,Math.ceil((dimStartAt+DIM_DELAY-now)/1000));
    txt+=' · '+left+'s后变暗';
  }else if(screenState==='dim'){
    txt+=' · 已变暗';
  }else if(screenState==='screenoff'){
    txt+=' · 已交由系统息屏';
  }

  el.textContent=txt;

  // 绿点：只在正常亮屏且检测到人脸时亮
  if(dot){
    const showDot=attnOn && faceInt && isLooking && !gazePaused;
    dot.classList.toggle('on',showDot);
  }
}
function fmtSec(s){
  if(s>=60)return Math.floor(s/60)+'分'+String(s%60).padStart(2,'0')+'秒';
  return s+'秒';
}
// 每秒刷新
setInterval(updateStatus,1000);

window.onerror=(m,u,l)=>console.error('ERR:',m,'L:',l);
</script>
